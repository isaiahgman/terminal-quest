name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Run on the merge queue's temporary branch so the required check is
  # satisfied for the (latest main + PR) combination before it lands.
  merge_group:

# Cancel an in-progress run when a branch/PR gets new commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Separate, named steps so a red check points straight at the culprit.
      - name: Format check (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Test (vitest)
        run: npm test

      - name: Build (tsc)
        run: npm run build
